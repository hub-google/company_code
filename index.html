<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>職域經營平台</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style2.css">
</head>

<body>
    <!-- Login Page -->
    <div id="loginPage" class="page active">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <h1>職域經營平台</h1>
                </div>
                <div class="login-form">
                    <div class="form-group">
                        <label for="username">業務員代碼</label>
                        <input type="text" id="username" placeholder="請輸入 8 碼代碼" maxlength="8">
                    </div>
                    <div class="form-group">
                        <label for="password">生日後四碼</label>
                        <input type="password" id="password" placeholder="生日後 4 碼 (MMDD)" maxlength="4">
                    </div>
                    <button id="loginBtn" class="btn-primary">登入</button>
                    <div id="loginError" class="error-msg"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard Page -->
    <div id="dashboardPage" class="page">
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-brand">職域代碼查詢系統</div>
                <div class="nav-user-info">
                    <span id="displayUserId">ID: --------</span>
                    <button id="logoutBtn" class="btn-text">登出</button>
                </div>
            </div>
        </nav>

        <main class="content-container">
            <!-- Inquiry Tab -->
            <section id="inquiryTab" class="tab-content active">
                <div class="custom-filter-bar">
                    <input type="text" id="inquirySearch" placeholder="搜尋類別、名稱或代碼..." style="flex:3;">
                    <select id="categoryFilter" style="flex:1;">
                        <option value="">類別</option>
                    </select>
                </div>
                <div class="custom-list-header">
                    <div class="col-kind-fixed">類別</div>
                    <div class="col-name-fixed-inq">職域名稱</div>
                    <div class="col-code-fixed">職域代碼</div>
                </div>
                <div id="inquiryList"></div>
            </section>
        </main>
    </div>

    <!-- PWA Install Prompt -->
    <div id="installBanner" class="install-banner">
        <span>將系統安裝至桌面/主畫面</span>
        <button id="installBtn" class="btn-small">安裝</button>
        <button id="closeInstallBtn" class="btn-icon">×</button>
    </div>

    <script src="app.js"></script>
    <script>
        // 初始化
        window.addEventListener('load', () => {
            const userId = localStorage.getItem('user_id');
            if (userId && document.getElementById('displayUserId')) {
                document.getElementById('displayUserId').textContent = 'ID: ' + userId;
            }
        });
    </script>
</body>

</html>
